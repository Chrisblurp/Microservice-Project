name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest
    
    - name: Build and push API
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.api
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/api:latest
    
    - name: Build and push Auth
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.auth
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/auth:latest
    
    - name: Update Kubernetes manifests
      run: |
        sed -i "s|image:.*frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/frontend:latest|g" k8s/*.yaml
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add k8s/
        git commit -m "Update images [skip ci]" || echo "No changes"
        git push
