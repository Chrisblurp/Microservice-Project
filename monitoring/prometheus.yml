global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-service'
    static_configs:
      - targets: ['api-service:3000']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:4000']

  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:80']

  - job_name: 'kubernetes-apis'
    kubernetes_sd_configs:
      - role: endpoints      